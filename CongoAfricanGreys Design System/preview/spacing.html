<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.ruler { display:flex; flex-direction:column; gap:10px; }
.row3 { display:flex; align-items:center; gap:16px; }
.bar { background:#e8604c; height:14px; border-radius:3px; }
.lbl { width:54px; font-size:12px; font-weight:700; color:var(--fg-1); font-family:var(--font-sans); }
.val { font-family:ui-monospace,Menlo,monospace; font-size:11px; color:var(--fg-3); }
.use { font-size:12px; color:var(--mid); margin-left:auto; }
</style></head><body><div class="card">
<div class="ruler">
  <div class="row3"><div class="lbl">xs</div><div class="bar" style="width:4px;"></div><div class="val">4px</div><div class="use">Icon gaps, tight inline</div></div>
  <div class="row3"><div class="lbl">sm</div><div class="bar" style="width:8px;"></div><div class="val">8px</div><div class="use">Pill padding, small gaps</div></div>
  <div class="row3"><div class="lbl">md</div><div class="bar" style="width:16px;"></div><div class="val">16px</div><div class="use">Field margin, grid gap</div></div>
  <div class="row3"><div class="lbl">lg</div><div class="bar" style="width:24px;"></div><div class="val">24px</div><div class="use">Card inner padding</div></div>
  <div class="row3"><div class="lbl">xl</div><div class="bar" style="width:40px;"></div><div class="val">40px</div><div class="use">Section sides</div></div>
  <div class="row3"><div class="lbl">2xl</div><div class="bar" style="width:64px;"></div><div class="val">64px</div><div class="use">Section top/bottom</div></div>
  <div class="row3"><div class="lbl">3xl</div><div class="bar" style="width:96px;"></div><div class="val">96px</div><div class="use">Hero padding</div></div>
</div>
</div></body></html>
