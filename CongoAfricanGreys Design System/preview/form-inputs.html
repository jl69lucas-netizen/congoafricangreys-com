<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.field { display:flex; flex-direction:column; gap:7px; }
.lbl { font-family:var(--font-sans); font-weight:700; font-size:12px; text-transform:uppercase; letter-spacing:.7px; color:#1c1a18; }
.inp { padding:12px 16px; border:1.5px solid #ede5dc; border-radius:10px; font-family:var(--font-sans); font-weight:400; font-size:14.5px; line-height:1.4; background:#fff9f6; color:#1c1a18; outline:none; transition:.2s; }
.inp::placeholder { color:#9b9189; }
.inp.focus { border-color:#e8604c; box-shadow:0 0 0 3px rgba(232,96,76,.1); background:#fff; }
.row2 { display:grid; grid-template-columns: 1fr 1fr; gap:18px; }
</style></head><body><div class="card">
<div class="row2">
  <div class="field"><label class="lbl">Your Name</label><input class="inp" placeholder="Mark Benjamin"></div>
  <div class="field"><label class="lbl">Email</label><input class="inp focus" value="teri@congoaf..." ></div>
</div>
<div class="row2">
  <div class="field"><label class="lbl">Phone</label><input class="inp" placeholder="(432) 555-0114"></div>
  <div class="field"><label class="lbl">Bird of interest</label>
    <select class="inp"><option>Congo African Grey — hen</option></select>
  </div>
</div>
<div class="field"><label class="lbl">Tell us about your home</label>
  <textarea class="inp" rows="2" placeholder="We read every inquiry personally and reply within 24–48 hours."></textarea>
</div>
</div></body></html>
