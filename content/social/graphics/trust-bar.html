<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>C.A.Gs Trust Bar — 1080×360</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,500;6..72,600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{ --green:#2D6A4F; --clay:#e8604c; --cream:#faf7f4; --ink:#20342b; }
  *{margin:0;box-sizing:border-box}
  body{background:#ddd;display:flex;justify-content:center;padding:24px;font-family:'IBM Plex Sans',sans-serif}
  /* Screenshot THIS element at 1080×360 (FB/IG link banner, post strip) */
  .card{width:1080px;height:360px;background:var(--cream);border-radius:24px;
    box-shadow:0 18px 40px rgba(60,30,10,.18);overflow:hidden;display:flex;flex-direction:column}
  .head{background:var(--green);color:#fff;padding:26px 44px;display:flex;align-items:baseline;gap:14px}
  .head h1{font-family:'Newsreader',serif;font-weight:600;font-size:34px;letter-spacing:.2px}
  .head .sub{font-size:16px;color:rgba(255,255,255,.85)}
  .row{flex:1;display:grid;grid-template-columns:repeat(5,1fr);gap:0;padding:8px 24px 16px}
  .item{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;padding:0 8px;
    border-right:1px solid rgba(45,106,79,.14)}
  .item:last-child{border-right:0}
  .ic{width:46px;height:46px;color:var(--green)}
  .lbl{font-weight:600;font-size:18px;color:var(--ink);line-height:1.15}
  .meta{font-size:13px;color:#6b7c72}
  .claybar{height:8px;background:var(--clay)}
</style>
</head>
<body>
  <div class="card">
    <div class="head">
      <h1>Here at C.A.Gs, every grey comes documented</h1>
      <span class="sub">Midland, TX · since 2014</span>
    </div>
    <div class="row">
      <div class="item">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>
        <span class="lbl">USDA AWA<br>Licensed</span>
      </div>
      <div class="item">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="m9 15 2 2 4-4"/></svg>
        <span class="lbl">CITES<br>Appendix I</span>
      </div>
      <div class="item">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/></svg>
        <span class="lbl">DNA-Sexed<br>(PCR)</span>
      </div>
      <div class="item">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l3 8 4-16 3 8h4"/></svg>
        <span class="lbl">Avian-Vet<br>Health Cert</span>
      </div>
      <div class="item">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 8 12 3 7 8"/><path d="M12 3v12"/><path d="M5 21h14a2 2 0 0 0 2-2v-4H3v4a2 2 0 0 0 2 2z"/></svg>
        <span class="lbl">Ships Nationwide<br><span class="meta">$185 airport · $350 home</span></span>
      </div>
    </div>
    <div class="claybar"></div>
  </div>
</body>
</html>
