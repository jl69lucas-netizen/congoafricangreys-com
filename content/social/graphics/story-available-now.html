<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>C.A.Gs Story — Available Now — 1080×1920</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,500;6..72,600;6..72,700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{ --green:#2D6A4F; --clay:#e8604c; --cream:#faf7f4; --ink:#20342b; }
  *{margin:0;box-sizing:border-box}
  body{background:#ddd;display:flex;justify-content:center;padding:24px;font-family:'IBM Plex Sans',sans-serif}
  /* Screenshot THIS element at 1080×1920 (IG/FB/TikTok story & Reel cover). Replace .photo background with the bird image. */
  .story{width:1080px;height:1920px;background:var(--green);position:relative;overflow:hidden;display:flex;flex-direction:column}
  .top{padding:80px 70px 0;text-align:center;color:#fff}
  .eyebrow{color:#ffd9cf;font-weight:600;letter-spacing:.18em;text-transform:uppercase;font-size:30px}
  .top h1{font-family:'Newsreader',serif;font-weight:700;font-size:96px;line-height:1;margin-top:18px}
  .top h1 em{font-style:italic;color:#ffb3a3}
  /* Photo slot — swap to: background:url('roys.jpg') center/cover */
  .photo{margin:54px 70px 0;height:840px;border-radius:32px;
    background:repeating-linear-gradient(45deg,#e7ded6 0 40px,#dcd2c8 40px 80px);
    border:6px solid rgba(255,255,255,.25);
    display:flex;align-items:center;justify-content:center;color:#9a8d80;font-size:30px;text-align:center}
  .card{margin:auto 70px 0;background:var(--cream);border-radius:32px;padding:46px 48px 40px;
    box-shadow:0 -10px 40px rgba(0,0,0,.18);margin-bottom:64px}
  .name{font-family:'Newsreader',serif;font-weight:700;color:var(--ink);font-size:62px;display:flex;align-items:baseline;gap:18px}
  .name .tag{font-family:'IBM Plex Sans';font-size:28px;font-weight:600;color:#fff;background:var(--green);padding:8px 20px;border-radius:50px}
  .detail{font-size:34px;color:#5a6b61;margin-top:14px}
  .price{font-family:'Newsreader',serif;font-weight:700;color:var(--green);font-size:72px;margin-top:18px}
  .ship{font-size:28px;color:var(--ink);margin-top:10px;font-weight:500}
  .cta{margin-top:32px;background:var(--clay);color:#fff;text-align:center;font-weight:600;font-size:40px;
    padding:30px;border-radius:50px}
</style>
</head>
<body>
  <div class="story">
    <div class="top">
      <div class="eyebrow">Available Now · C.A.Gs</div>
      <h1>Meet <em>Roys</em></h1>
    </div>
    <div class="photo">[ swap in Roys' photo — center/cover ]</div>
    <div class="card">
      <div class="name">Roys <span class="tag">Congo · Male</span></div>
      <div class="detail">Hand-raised &amp; weaned · 4 months · DNA-sexed</div>
      <div class="price">$2,300</div>
      <div class="ship">Ships nationwide · $185 airport · $350 home</div>
      <div class="cta">DM us “AVAILABLE” 👇</div>
    </div>
  </div>
</body>
</html>
