backend:
  name: github
  repo: jl69lucas-netizen/congoafricangreys-com
  branch: main
  base_url: https://decap-oauth-gateway.netlify.app

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "birds"
    label: "Available Birds"
    label_singular: "Bird"
    folder: "_data/birds"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "Bird Name / ID", name: "name", widget: "string" }
      - label: "Species"
        name: "species"
        widget: "select"
        options: ["Congo African Grey", "Timneh African Grey", "Breeding Pair", "Fertile Egg"]
        default: "Congo African Grey"
      - label: "Status"
        name: "status"
        widget: "select"
        options: ["Available", "Reserved", "Sold"]
        default: "Available"
      - { label: "Price", name: "price", widget: "string" }
      - label: "DNA Sexed"
        name: "dna_sexed"
        widget: "select"
        options: ["Male", "Female", "Unknown", "N/A (Egg)"]
        default: "Unknown"
      - { label: "Age", name: "age", widget: "string", required: false }
      - { label: "CITES / Legal Docs", name: "cites", widget: "string", required: false }
      - label: "Talking Skills"
        name: "talking_skills"
        widget: "select"
        options: ["None", "Beginner", "Intermediate", "Advanced", "Exceptional"]
        default: "None"
      - { label: "Main Photo", name: "photo", widget: "image", required: false }
      - { label: "Description", name: "description", widget: "markdown" }
      - { label: "Health Info", name: "health_info", widget: "text", required: false }

  - name: "locations"
    label: "USA Location Pages"
    label_singular: "Location Page"
    folder: "_data/locations"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "State Name", name: "state", widget: "string" }
      - { label: "State Abbreviation", name: "state_abbr", widget: "string" }
      - { label: "Page Heading", name: "heading", widget: "string" }
      - { label: "Local Content", name: "content", widget: "markdown" }
      - { label: "Delivery Info", name: "delivery_info", widget: "text", required: false }
      - label: "SEO"
        name: "seo"
        widget: "object"
        fields:
          - { label: "Page Title", name: "title", widget: "string" }
          - { label: "Meta Description", name: "description", widget: "text" }
          - { label: "Focus Keyword", name: "focus_keyword", widget: "string", required: false }
          - { label: "Canonical URL", name: "canonical", widget: "string", required: false }

  - name: "testimonials"
    label: "Testimonials"
    label_singular: "Testimonial"
    folder: "_data/testimonials"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "Customer Name", name: "name", widget: "string" }
      - { label: "Location", name: "location", widget: "string", required: false }
      - { label: "Bird Purchased", name: "bird_purchased", widget: "string", required: false }
      - label: "Star Rating"
        name: "rating"
        widget: "select"
        options: ["5", "4", "3"]
        default: "5"
      - { label: "Review", name: "review", widget: "text" }
      - { label: "Date", name: "date", widget: "date", format: "YYYY-MM-DD", required: false }

  - name: "secure_purchase"
    label: "Secure Purchase Process"
    files:
      - name: "purchase_steps"
        label: "Purchase Steps"
        file: "_data/secure_purchase.json"
        fields:
          - { label: "Page Heading", name: "heading", widget: "string" }
          - { label: "Intro Text", name: "intro", widget: "text" }
          - label: "Steps"
            name: "steps"
            widget: "list"
            fields:
              - { label: "Step Number", name: "number", widget: "number" }
              - { label: "Step Title", name: "title", widget: "string" }
              - { label: "Step Description", name: "description", widget: "text" }

  - name: "health_guarantee"
    label: "Health Guarantee"
    files:
      - name: "guarantee_terms"
        label: "Guarantee Terms"
        file: "_data/health_guarantee.json"
        fields:
          - { label: "Page Heading", name: "heading", widget: "string" }
          - { label: "Guarantee Duration", name: "duration", widget: "string" }
          - { label: "Terms & Conditions", name: "terms", widget: "markdown" }
          - { label: "What is Covered", name: "covered", widget: "markdown" }
          - { label: "What is NOT Covered", name: "not_covered", widget: "markdown", required: false }

  - name: "blog"
    label: "Blog"
    label_singular: "Blog Post"
    folder: "_data/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "date", format: "YYYY-MM-DD" }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["Care Guide", "Diet & Nutrition", "Training", "Health", "Species Info", "News", "Success Stories"]
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Content", name: "body", widget: "markdown" }
      - { label: "YouTube Video URL", name: "youtube_url", widget: "string", required: false }
      - { label: "YouTube Description", name: "youtube_description", widget: "text", required: false }
      - label: "SEO"
        name: "seo"
        widget: "object"
        collapsed: true
        fields:
          - { label: "Page Title", name: "title", widget: "string", required: false }
          - { label: "Meta Description", name: "description", widget: "text", required: false }
          - { label: "Focus Keyword", name: "focus_keyword", widget: "string", required: false }

  - name: "site_settings"
    label: "Site Settings & SEO"
    files:
      - name: "global_seo"
        label: "Global SEO Defaults"
        file: "_data/settings.json"
        fields:
          - { label: "Site Name", name: "site_name", widget: "string" }
          - { label: "Site URL", name: "site_url", widget: "string" }
          - { label: "Default Meta Title", name: "default_title", widget: "string" }
          - { label: "Default Meta Description", name: "default_description", widget: "text" }
          - { label: "OG Image", name: "og_image", widget: "image", required: false }
          - { label: "Google Analytics ID", name: "ga_id", widget: "string", required: false }
          - label: "Organization Schema"
            name: "schema_org"
            widget: "object"
            collapsed: true
            fields:
              - { label: "Business Name", name: "name", widget: "string" }
              - { label: "Phone", name: "phone", widget: "string", required: false }
              - { label: "Email", name: "email", widget: "string", required: false }
      - name: "homepage_seo"
        label: "Homepage SEO"
        file: "_data/pages/homepage.json"
        fields:
          - { label: "Page Title", name: "title", widget: "string" }
          - { label: "Meta Description", name: "description", widget: "text" }
          - { label: "Focus Keyword", name: "focus_keyword", widget: "string", required: false }
          - { label: "OG Title", name: "og_title", widget: "string", required: false }
          - { label: "OG Description", name: "og_description", widget: "text", required: false }
          - { label: "Canonical URL", name: "canonical", widget: "string", required: false }
          - { label: "H1 Heading", name: "h1", widget: "string", required: false }
