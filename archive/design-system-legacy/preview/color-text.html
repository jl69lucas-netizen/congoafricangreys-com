<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.row2 { display:grid; grid-template-columns: repeat(3, 1fr); gap:16px; }
.sw { display:flex; flex-direction:column; gap:6px; }
.chip { height:78px; border-radius:14px; border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-family:var(--font-sans); font-weight:700; }
</style></head><body><div class="card">
<div class="row2">
  <div class="sw"><div class="chip" style="background:#fff; color:#1c1a18; font-size:24px;">Aa</div>
    <div class="swatch-name">Primary</div>
    <div class="mono">#1c1a18 · --text</div>
    <div class="swatch-sub">Headings, key body</div></div>
  <div class="sw"><div class="chip" style="background:#fff; color:#5a5248; font-size:24px;">Aa</div>
    <div class="swatch-name">Secondary</div>
    <div class="mono">#5a5248 · --mid</div>
    <div class="swatch-sub">Body paragraphs</div></div>
  <div class="sw"><div class="chip" style="background:#fff; color:#9b9189; font-size:24px;">Aa</div>
    <div class="swatch-name">Tertiary</div>
    <div class="mono">#9b9189 · --light</div>
    <div class="swatch-sub">Placeholder, captions</div></div>
</div>
<div class="row2">
  <div class="sw"><div class="chip" style="background:#fff; color:#e8604c; font-size:18px;">Reserve →</div>
    <div class="swatch-name">Link / accent</div>
    <div class="mono">#e8604c · --clay</div></div>
  <div class="sw"><div class="chip" style="background:#1c1a18; color:#fff; font-size:18px;">On dark</div>
    <div class="swatch-name">Inverse</div>
    <div class="mono">#ffffff on --dark-panel</div></div>
  <div class="sw"><div class="chip" style="background:#eaf4ef; color:#2D6A4F; font-size:14px; letter-spacing:1px;">USDA LICENSED</div>
    <div class="swatch-name">Success / tag</div>
    <div class="mono">--green on --green-lt</div></div>
</div>
</div></body></html>
