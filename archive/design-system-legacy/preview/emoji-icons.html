<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.grid { display:grid; grid-template-columns: repeat(5, 1fr); gap:16px; }
.cell { display:flex; flex-direction:column; align-items:center; gap:6px; text-align:center; padding:12px 6px; background:#fff; border:1px solid var(--border); border-radius:14px; }
.glyph { font-size:28px; line-height:1; }
.nm { font-family:var(--font-sans); font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:.7px; color:#1c1a18; }
.sub { font-family:var(--font-sans); font-size:10.5px; color:var(--fg-3); }
</style></head><body><div class="card">
<div class="grid">
  <div class="cell"><div class="glyph">🦜</div><div class="nm">Parrot</div><div class="sub">Brand mark</div></div>
  <div class="cell"><div class="glyph">📞</div><div class="nm">Phone</div><div class="sub">Contact rows</div></div>
  <div class="cell"><div class="glyph">✉️</div><div class="nm">Email</div><div class="sub">Form labels</div></div>
  <div class="cell"><div class="glyph">📍</div><div class="nm">Location</div><div class="sub">Address, map</div></div>
  <div class="cell"><div class="glyph">🕐</div><div class="nm">Hours</div><div class="sub">Business hours</div></div>
  <div class="cell"><div class="glyph">✈️</div><div class="nm">Air ship</div><div class="sub">Shipping</div></div>
  <div class="cell"><div class="glyph">🚗</div><div class="nm">Delivery</div><div class="sub">Local</div></div>
  <div class="cell"><div class="glyph">✅</div><div class="nm">Confirm</div><div class="sub">Success</div></div>
  <div class="cell"><div class="glyph">❋</div><div class="nm">Divider</div><div class="sub">Decorative</div></div>
  <div class="cell" style="background:var(--cream); border-style:dashed;"><div class="glyph" style="opacity:.4;">＋</div><div class="nm" style="color:var(--fg-3);">No more</div><div class="sub">One-emoji-each</div></div>
</div>
</div></body></html>
