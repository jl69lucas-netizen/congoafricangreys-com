<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.row-btns { display:flex; gap:14px; flex-wrap:wrap; align-items:center; }
.btn { font-family:var(--font-sans); font-weight:700; cursor:pointer; transition: background .2s, transform .15s, box-shadow .2s; border:none; }
.btn-primary { background:#e8604c; color:#fff; padding:14px 32px; border-radius:50px; font-size:15px; letter-spacing:.2px; box-shadow:0 6px 20px rgba(232,96,76,.38); }
.btn-primary-sq { background:#e8604c; color:#fff; padding:14px 32px; border-radius:12px; font-size:15px; box-shadow:0 6px 20px rgba(232,96,76,.38); }
.btn-outline { background:transparent; color:#e8604c; border:2px solid #e8604c; padding:12px 28px; border-radius:50px; font-size:14px; }
.btn-dark { background:#1c1a18; color:#fff; padding:14px 32px; border-radius:50px; font-size:15px; }
.tag-green { background:#eaf4ef; color:#2D6A4F; border:1px solid rgba(45,106,79,.2); padding:5px 14px; border-radius:50px; font-family:var(--font-sans); font-weight:700; font-size:11px; letter-spacing:1px; text-transform:uppercase; }
.label-mini { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--fg-3); font-weight:600; margin-bottom:6px; }
.group { display:flex; flex-direction:column; }
</style></head><body><div class="card">
<div class="group">
  <div class="label-mini">Primary clay — pill (CTAs)</div>
  <div class="row-btns">
    <button class="btn btn-primary">Reserve Your Grey</button>
    <button class="btn btn-primary" style="background:#c94d3a; transform:translateY(-2px); box-shadow:0 10px 28px rgba(232,96,76,.48);">Hover state</button>
  </div>
</div>
<div class="group">
  <div class="label-mini">Primary clay — 12px (forms)</div>
  <div class="row-btns">
    <button class="btn btn-primary-sq">Send Inquiry</button>
  </div>
</div>
<div class="group">
  <div class="label-mini">Outline clay</div>
  <div class="row-btns">
    <button class="btn btn-outline">View Available Birds</button>
    <button class="btn btn-outline" style="background:#e8604c; color:#fff;">Hover (filled)</button>
  </div>
</div>
<div class="group">
  <div class="label-mini">Green tag / badge</div>
  <div class="row-btns">
    <span class="tag-green">USDA Licensed</span>
    <span class="tag-green">CITES Documented</span>
    <span class="tag-green">DNA Sexed</span>
  </div>
</div>
</div></body></html>
