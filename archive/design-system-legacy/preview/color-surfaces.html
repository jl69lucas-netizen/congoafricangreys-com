<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:16px; }
.sw { display:flex; flex-direction:column; gap:8px; }
.chip { height:88px; border-radius:14px; border:1px solid var(--border); box-shadow: var(--shadow); }
</style></head><body><div class="card">
<div class="grid">
  <div class="sw"><div class="chip" style="background:#faf7f4;"></div>
    <div class="swatch-name">Cream</div>
    <div class="mono">#faf7f4 · --cream</div>
    <div class="swatch-sub">Page background</div></div>
  <div class="sw"><div class="chip" style="background:#fff9f6;"></div>
    <div class="swatch-name">Warm White</div>
    <div class="mono">#fff9f6 · --warm-white</div>
    <div class="swatch-sub">Inputs, inner card</div></div>
  <div class="sw"><div class="chip" style="background:#ffffff;"></div>
    <div class="swatch-name">Card</div>
    <div class="mono">#ffffff · --card-bg</div>
    <div class="swatch-sub">Standard card surface</div></div>
  <div class="sw"><div class="chip" style="background:#ede5dc;"></div>
    <div class="swatch-name">Border</div>
    <div class="mono">#ede5dc · --border</div>
    <div class="swatch-sub">All borders, dividers</div></div>
  <div class="sw"><div class="chip" style="background:#1c1a18;"></div>
    <div class="swatch-name">Dark Panel</div>
    <div class="mono">#1c1a18 · --dark-panel</div>
    <div class="swatch-sub">CTA banner, footer</div></div>
  <div class="sw"><div class="chip" style="background:linear-gradient(135deg,#fde8e3 0%,#fdf0e8 50%,#fdf6ec 100%);"></div>
    <div class="swatch-name">Hero gradient</div>
    <div class="mono">135° clay-tints</div>
    <div class="swatch-sub">Page-hero banners</div></div>
</div>
</div></body></html>
