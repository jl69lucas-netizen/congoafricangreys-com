<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:20px; }
.sw { display:flex; flex-direction:column; gap:10px; align-items:flex-start; }
.box { width:100%; height:90px; background:#fff; border-radius:14px; border:1px solid var(--border); }
.btn { width:auto; height:44px; padding:0 28px; border-radius:50px; background:#e8604c; color:#fff; font-family:var(--font-sans); font-weight:700; font-size:14px; display:flex; align-items:center; }
</style></head><body><div class="card">
<div class="grid">
  <div class="sw">
    <div class="box" style="box-shadow: 0 2px 16px rgba(60,30,10,.08), 0 8px 40px rgba(60,30,10,.06);"></div>
    <div class="swatch-name">--shadow</div>
    <div class="mono">2/16 + 8/40 · warm</div>
    <div class="swatch-sub">Default cards</div>
  </div>
  <div class="sw">
    <div class="box" style="box-shadow: 0 4px 24px rgba(60,30,10,.1), 0 16px 56px rgba(60,30,10,.08);"></div>
    <div class="swatch-name">--shadow-lg</div>
    <div class="mono">4/24 + 16/56 · warm</div>
    <div class="swatch-sub">Hover, lifted cards</div>
  </div>
  <div class="sw" style="align-items:flex-start; justify-content:center; height:90px;">
    <div style="display:flex; height:90px; align-items:center;"><div class="btn" style="box-shadow: 0 6px 20px rgba(232,96,76,.38);">Reserve</div></div>
    <div class="swatch-name">--shadow-btn</div>
    <div class="mono">6/20 · clay 38%</div>
    <div class="swatch-sub">Clay button glow</div>
  </div>
</div>
</div></body></html>
