<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:16px; }
.sw { display:flex; flex-direction:column; gap:8px; }
.chip { height:88px; border-radius:14px; border:1px solid var(--border); box-shadow: var(--shadow); }
</style></head><body><div class="card">
<div class="grid">
  <div class="sw"><div class="chip" style="background:#e8604c;"></div>
    <div class="swatch-name">Clay</div>
    <div class="mono">#e8604c · --clay</div>
    <div class="swatch-sub">Primary CTA, accents</div></div>
  <div class="sw"><div class="chip" style="background:#f08070;"></div>
    <div class="swatch-name">Clay Light</div>
    <div class="mono">#f08070 · --clay-lt</div>
    <div class="swatch-sub">Hover ramp / gradient</div></div>
  <div class="sw"><div class="chip" style="background:#c94d3a;"></div>
    <div class="swatch-name">Clay Dark</div>
    <div class="mono">#c94d3a · --clay-dk</div>
    <div class="swatch-sub">Pressed / deep hover</div></div>
  <div class="sw"><div class="chip" style="background:#2D6A4F;"></div>
    <div class="swatch-name">Forest Green</div>
    <div class="mono">#2D6A4F · --green</div>
    <div class="swatch-sub">Nav, info headers</div></div>
  <div class="sw"><div class="chip" style="background:#eaf4ef;"></div>
    <div class="swatch-name">Green Light</div>
    <div class="mono">#eaf4ef · --green-lt</div>
    <div class="swatch-sub">Tag / success bg</div></div>
  <div class="sw"><div class="chip" style="background:#e8604c;"></div>
    <div class="swatch-name">Gold = Clay</div>
    <div class="mono">#e8604c · --gold</div>
    <div class="swatch-sub">Legacy alias of clay</div></div>
</div>
</div></body></html>
