<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
body { background:#fff; }
.card { padding:0; }
.hero {
  display: grid;
  grid-template-rows: 165px 1fr;
  min-height: 100%;
  border-bottom: 1px solid #f0e4da;
}

/* Top — image placeholder */
.photo {
  position: relative;
  background:
    radial-gradient(120% 100% at 50% 0%, rgba(232,96,76,.08), transparent 55%),
    linear-gradient(135deg, #d9c8ba 0%, #b8a394 55%, #8c7a6a 100%);
  display:flex; align-items:center; justify-content:center;
  overflow: hidden;
}
.photo::after {
  content:''; position:absolute; inset:0;
  background: repeating-linear-gradient(45deg, rgba(255,255,255,.025) 0 2px, transparent 2px 14px);
  pointer-events:none;
}
.ph-mark { font-size: 52px; filter: drop-shadow(0 6px 12px rgba(0,0,0,.18)); opacity: .85; }
.ph-note {
  position:absolute; top: 12px; left: 12px;
  display:inline-flex; align-items:center; gap:6px;
  background: rgba(255,255,255,.82); backdrop-filter: blur(4px);
  border: 1px solid rgba(255,255,255,.5);
  padding: 4px 10px; border-radius: 50px;
  font-family: var(--font-sans); font-weight:700; font-size: 9px;
  letter-spacing: 1px; text-transform: uppercase; color: var(--text);
}
.ph-note .dot { width:5px; height:5px; border-radius:50%; background: var(--clay); }
.ph-spec {
  position:absolute; bottom: 10px; right: 12px;
  font-family: ui-monospace, Menlo, monospace; font-size: 9px;
  color: rgba(255,255,255,.72); letter-spacing:.5px;
}

/* Bottom — gradient text panel */
.panel {
  background: linear-gradient(135deg, #fde8e3 0%, #fdf0e8 50%, #fdf6ec 100%);
  padding: 16px 20px 18px;
  display:flex; flex-direction:column; justify-content:center; gap: 6px;
}
.eyebrow {
  font-family: var(--font-sans); font-weight:700; font-size:9px;
  letter-spacing:1px; text-transform:uppercase; color: var(--green);
  display:inline-flex; align-items:center; gap:6px;
}
.eyebrow::before { content:''; width:14px; height:1.5px; background: var(--green); display:inline-block; }
.title {
  font-family: var(--font-display); font-weight:700;
  font-size: 22px; line-height: 1.05; color: var(--text);
  margin: 2px 0 2px; letter-spacing: -.01em;
}
.title em { color: var(--clay-dk); font-style: italic; }
.row { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-top: 4px; }
.sub {
  font-family: var(--font-sans); font-size: 11px; color: var(--mid);
  line-height: 1.45; margin: 0; flex: 1;
}
.cta {
  display:inline-flex; align-items:center; gap:5px;
  background: var(--clay); color:#fff;
  padding: 8px 16px; border-radius: 50px;
  font-family: var(--font-sans); font-weight:700; font-size: 11px;
  box-shadow: 0 6px 20px rgba(232,96,76,.38);
  white-space: nowrap; flex-shrink: 0;
}
</style></head><body><div class="card"><div class="hero">
  <div class="photo">
    <span class="ph-note"><span class="dot"></span>Bird photo · drop in</span>
    <span class="ph-mark">🦜</span>
    <span class="ph-spec">2400 × 1600 · warm</span>
  </div>
  <div class="panel">
    <span class="eyebrow">Midland, TX · Est. 2014</span>
    <h1 class="title">Bringing home an <em>African Grey</em></h1>
    <div class="row">
      <p class="sub">A thirty-year decision — made well.</p>
      <a class="cta">Reserve →</a>
    </div>
  </div>
</div></div></body></html>
