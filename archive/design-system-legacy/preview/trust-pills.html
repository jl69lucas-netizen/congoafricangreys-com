<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.pills { display:flex; gap:10px; flex-wrap:wrap; }
.t-pill { display:inline-flex; align-items:center; gap:8px; background:#fff; border:1px solid #ede5dc; padding:9px 16px; border-radius:50px; font-family:var(--font-sans); font-weight:600; font-size:12px; color:#1c1a18; box-shadow: 0 2px 8px rgba(60,30,10,.04); }
.t-pill .ico { font-size:14px; }
.t-pill .em { color:#2D6A4F; font-weight:700; letter-spacing:.4px; }
.section + .section { margin-top:16px; }
.lbl { font-family:var(--font-sans); font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--fg-3); margin-bottom:10px; display:block; }
</style></head><body><div class="card">
<div class="section">
  <span class="lbl">Trust pill row — on cream</span>
  <div class="pills">
    <span class="t-pill"><span class="ico">✅</span><span class="em">USDA-Licensed</span> Breeder</span>
    <span class="t-pill"><span class="ico">✅</span><span class="em">CITES</span> Appendix II</span>
    <span class="t-pill"><span class="ico">✅</span><span class="em">DNA-Sexed</span> &amp; Vet-Certified</span>
  </div>
</div>
<div class="section">
  <span class="lbl">Trust pill row — secondary</span>
  <div class="pills">
    <span class="t-pill"><span class="ico">✈️</span>Ships nationwide from <span class="em">$185</span></span>
    <span class="t-pill"><span class="ico">🕐</span><span class="em">24–48 hr</span> response</span>
    <span class="t-pill"><span class="ico">🦜</span>Health guarantee on every bird</span>
  </div>
</div>
</div></body></html>
