<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.lbl { font-family:var(--font-sans); font-weight:700; font-size:12px; text-transform:uppercase; letter-spacing:.7px; color:#1c1a18; margin-bottom:10px; display:block; }
.pills { display:flex; gap:10px; flex-wrap:wrap; }
.pill { display:flex; align-items:center; gap:8px; background:#fff9f6; border:1.5px solid #ede5dc; border-radius:10px; padding:9px 16px; font-family:var(--font-sans); font-weight:400; font-size:13.5px; color:#5a5248; cursor:pointer; transition: all .15s; }
.pill .dot { width:14px; height:14px; border-radius:50%; border:1.5px solid #ede5dc; }
.pill.checked { background:#fff3ef; border-color:#e8604c; color:#c94d3a; font-weight:600; }
.pill.checked .dot { border-color:#e8604c; background:radial-gradient(circle, #e8604c 45%, #fff3ef 50%); }
.section + .section { margin-top:20px; }
</style></head><body><div class="card">
<div class="section">
  <span class="lbl">Bird preference</span>
  <div class="pills">
    <div class="pill checked"><span class="dot"></span>Congo Grey</div>
    <div class="pill"><span class="dot"></span>Timneh Grey</div>
    <div class="pill"><span class="dot"></span>Either / no preference</div>
  </div>
</div>
<div class="section">
  <span class="lbl">Shipping</span>
  <div class="pills">
    <div class="pill"><span class="dot"></span>✈️ Air shipping</div>
    <div class="pill checked"><span class="dot"></span>🚗 Local delivery</div>
    <div class="pill"><span class="dot"></span>Pickup in Midland</div>
  </div>
</div>
</div></body></html>
