<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.grid { display:grid; grid-template-columns: repeat(5, 1fr); gap:16px; }
.sw { display:flex; flex-direction:column; gap:8px; align-items:flex-start; }
.box { width:100%; height:80px; background:#fff; border:1.5px solid var(--border); box-shadow: var(--shadow); }
.pill { width:100%; height:42px; background:#e8604c; border-radius:50px; display:flex; align-items:center; justify-content:center; color:#fff; font-family:var(--font-sans); font-weight:700; font-size:13px; }
</style></head><body><div class="card">
<div class="grid">
  <div class="sw"><div class="box" style="border-radius:8px;"></div><div class="swatch-name">sm</div><div class="mono">8px</div><div class="swatch-sub">Badges, social</div></div>
  <div class="sw"><div class="box" style="border-radius:10px;"></div><div class="swatch-name">md</div><div class="mono">10px</div><div class="swatch-sub">Inputs, small cards</div></div>
  <div class="sw"><div class="box" style="border-radius:14px;"></div><div class="swatch-name">lg</div><div class="mono">14px</div><div class="swatch-sub">Map boxes, icon wraps</div></div>
  <div class="sw"><div class="box" style="border-radius:20px;"></div><div class="swatch-name">xl</div><div class="mono">20px</div><div class="swatch-sub">Cards, info panels</div></div>
  <div class="sw"><div class="pill">Pill</div><div class="swatch-name">pill</div><div class="mono">50px</div><div class="swatch-sub">CTAs, tags</div></div>
</div>
</div></body></html>
