<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.grid { display:grid; grid-template-columns: 1fr 1fr; gap:18px; align-items:start; }
.card-std { background:#fff; border-radius:20px; border:1px solid #ede5dc; box-shadow: 0 2px 16px rgba(60,30,10,.08), 0 8px 40px rgba(60,30,10,.06); overflow:hidden; }
.card-std .body { padding:20px 22px; }
.card-std .photo { aspect-ratio: 4/3; background: linear-gradient(135deg,#fde8e3,#fdf0e8); display:flex; align-items:center; justify-content:center; color:#c94d3a; font-family:var(--font-sans); font-size:13px; font-weight:600; }
.tag-green { background:#eaf4ef; color:#2D6A4F; border:1px solid rgba(45,106,79,.2); padding:4px 11px; border-radius:50px; font-family:var(--font-sans); font-weight:700; font-size:10px; letter-spacing:1px; text-transform:uppercase; display:inline-block; margin-bottom:8px; }
.card-std h3 { font-family:var(--font-display); font-weight:700; font-size:20px; margin:0 0 4px; color:#1c1a18; }
.card-std p { margin:0; color:#5a5248; font-size:13.5px; line-height:1.5; }
.info-card .hdr { background:#2D6A4F; color:#fff; padding:22px 22px; }
.info-card .hdr h3 { font-family:var(--font-display); font-weight:700; font-size:20px; margin:0 0 4px; color:#fff; }
.info-card .hdr p { color:rgba(255,255,255,.85); font-size:13px; margin:0; }
.info-card .body ul { margin:0; padding:0; list-style:none; }
.info-card .body li { font-size:13.5px; color:#5a5248; padding:8px 0; border-bottom:1px solid #ede5dc; display:flex; gap:10px; align-items:center; }
.info-card .body li:last-child { border-bottom:none; }
</style></head><body><div class="card">
<div class="grid">
  <div class="card-std">
    <div class="photo">🦜 Bird photo — drop in</div>
    <div class="body">
      <span class="tag-green">Ready in 2 wks</span>
      <h3>Otis — Congo hen</h3>
      <p>16-week, DNA-sexed, hand-fed.<br>Weaned onto pellet + fresh.</p>
    </div>
  </div>
  <div class="card-std info-card">
    <div class="hdr">
      <h3>Visit our aviary</h3>
      <p>By appointment, Midland TX</p>
    </div>
    <div class="body" style="padding:18px 22px;">
      <ul>
        <li>📍 Midland, TX 79703</li>
        <li>🕐 Tue–Sat · 10a–5p</li>
        <li>📞 (432) 555-0114</li>
      </ul>
    </div>
  </div>
</div>
</div></body></html>
